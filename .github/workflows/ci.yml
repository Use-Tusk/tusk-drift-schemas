name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change detection
        uses: bufbuild/buf-breaking-action@v1
        with:
          against: "https://github.com/Use-Tusk/tusk-drift-schemas.git#branch=main"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        run: rustup show

      - name: Generate code
        run: npm run generate

      - name: Build
        run: npm run build

      - name: Rust check
        run: cargo check -p tusk-drift-schemas

      - name: Check generated code is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Run 'npm run generate && npm run build' and commit the changes."
            git status --short
            exit 1
          fi

      - name: NPM smoke test
        run: npm run smoke:pack
